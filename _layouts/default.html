<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="Rechtliche Informationen und Support für die NutriForge App.">
  <link rel="icon" href="{{ '/assets/icon.png' | relative_url }}">
  <style>
    :root {
      --nf-primary: #2DD4A8;
      --nf-secondary: #6C63FF;
      --nf-text: #1A2233;
      --nf-muted: #64748B;
      --nf-bg: #F4F6F8;
      --nf-card: #FFFFFF;
      --nf-border: #E5E9EE;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nf-text: #EAEFF5;
        --nf-muted: #94A3B8;
        --nf-bg: #10141A;
        --nf-card: #1A2030;
        --nf-border: #262E40;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--nf-text);
      background: var(--nf-bg);
      line-height: 1.7;
    }
    .nf-header {
      background: linear-gradient(135deg, var(--nf-primary), var(--nf-secondary));
      padding: 28px 20px;
    }
    .nf-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 760px;
      margin: 0 auto;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.25rem;
    }
    .nf-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    .nf-main {
      max-width: 760px;
      margin: -28px auto 40px;
      padding: 0 20px;
    }
    .nf-card {
      background: var(--nf-card);
      border: 1px solid var(--nf-border);
      border-radius: 16px;
      padding: 32px clamp(20px, 5vw, 44px);
      box-shadow: 0 10px 30px rgba(20, 30, 50, 0.08);
    }
    h1 { font-size: 1.9rem; margin-top: 0; }
    h2 { font-size: 1.4rem; margin-top: 2em; }
    h3 { font-size: 1.1rem; }
    a { color: var(--nf-secondary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, pre { background: var(--nf-bg); border-radius: 6px; padding: 2px 6px; }
    hr { border: none; border-top: 1px solid var(--nf-border); margin: 2em 0; }
    ul { padding-left: 1.3em; }

    /* Landing-page link cards (index.md) */
    .nf-links { list-style: none; padding: 0; margin: 1.5em 0 0; display: grid; gap: 12px; }
    .nf-links li a {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--nf-border);
      border-radius: 12px;
      color: var(--nf-text);
      font-weight: 600;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .nf-links li a:hover {
      border-color: var(--nf-secondary);
      transform: translateX(2px);
      text-decoration: none;
    }
    .nf-links li a::after { content: "→"; float: right; color: var(--nf-secondary); }

    .nf-footer {
      max-width: 760px;
      margin: 0 auto 40px;
      padding: 0 20px;
      color: var(--nf-muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="nf-header">
    <a href="{{ '/' | relative_url }}" class="nf-brand">
      <img src="{{ '/assets/icon.png' | relative_url }}" alt="" class="nf-logo">
      <span>NutriForge</span>
    </a>
  </div>
  <main class="nf-main">
    <div class="nf-card">
      {{ content }}
    </div>
  </main>
  <div class="nf-footer">© {{ site.time | date: '%Y' }} Florian Selinger · NutriForge</div>
</body>
</html>
